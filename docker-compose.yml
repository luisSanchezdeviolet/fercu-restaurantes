version: '3.8'

services:
  phprestaurante:
    image: mysql:8.0
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: restaurantpos
      MYSQL_DATABASE: restaurante_pos
      MYSQL_USER: restaurantpos
      MYSQL_PASSWORD: restaurantpos
    ports:
      - "3308:3306"
    volumes:
      - ./data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password